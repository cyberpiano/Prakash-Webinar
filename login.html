<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | African Real Estate </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #e5e5e5; }
        .gold-gradient { background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); }
        .gold-text { background: linear-gradient(135deg, #BF953F, #FCF6BA, #AA771C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(191, 149, 63, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .luxury-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
        .luxury-input:focus { border-color: #BF953F; outline: none; background: rgba(255,255,255,0.08); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="glass-card p-10 md:p-16 rounded-[3rem] w-full max-w-md border-[#BF953F]/30 text-center relative overflow-hidden">
        <div class="absolute -top-20 -left-20 w-40 h-40 gold-gradient opacity-10 blur-3xl rounded-full"></div>
        
        <div class="mb-10">
            <div class="w-16 h-16 gold-gradient rounded-full flex items-center justify-center text-black text-2xl mx-auto mb-6">
                <i class="fas fa-shield-halved"></i>
            </div>
            <h2 class="text-3xl font-black mb-2 uppercase tracking-tighter">Admin <span class="gold-text">Access</span></h2>
            <p class="text-gray-500 text-xs tracking-widest uppercase">Prophet Prakash Pyne | Secure Portal</p>
        </div>

        <form id="login-form" class="space-y-6 text-left">
            <div class="space-y-2">
                <label class="text-[10px] uppercase tracking-widest font-black text-gray-500 ml-2">Admin Email</label>
                <input type="email" id="login-email" required class="w-full p-4 luxury-input rounded-xl text-white outline-none">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] uppercase tracking-widest font-black text-gray-500 ml-2">Password</label>
                <input type="password" id="login-password" required class="w-full p-4 luxury-input rounded-xl text-white outline-none">
            </div>
            <button type="submit" id="login-btn" class="w-full gold-gradient p-5 rounded-2xl text-black font-black uppercase tracking-[0.2em] shadow-2xl hover:scale-[1.02] transition-transform flex items-center justify-center gap-2">
                <span id="btn-text">Authorize Access</span>
                <i class="fas fa-arrow-right text-xs"></i>
            </button>
        </form>
    </div>

    <script src="config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        // Firebase Configuration (Secured via config.js)
        const firebaseConfig = window.CONFIG.FIREBASE;

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Redirect if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "admin.html";
            }
        });

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const btnText = document.getElementById('btn-text');
            
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;

            try {
                btn.disabled = true;
                btnText.textContent = "Authorizing...";
                await signInWithEmailAndPassword(auth, email, pass);
                // Redirect is handled by onAuthStateChanged
            } catch (err) {
                alert("Authorization Failed: " + err.message);
                btn.disabled = false;
                btnText.textContent = "Authorize Access";
            }
        };
    </script>
</body>
</html>
