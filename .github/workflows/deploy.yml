name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Config File
        run: |
          echo "window.CONFIG = {" > config.js
          echo "    FIREBASE: {" >> config.js
          echo "        apiKey: \"${{ secrets.FIREBASE_API_KEY }}\"," >> config.js
          echo "        authDomain: \"${{ secrets.FIREBASE_AUTH_DOMAIN }}\"," >> config.js
          echo "        projectId: \"${{ secrets.FIREBASE_PROJECT_ID }}\"," >> config.js
          echo "        storageBucket: \"${{ secrets.FIREBASE_STORAGE_BUCKET }}\"," >> config.js
          echo "        messagingSenderId: \"${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}\"," >> config.js
          echo "        appId: \"${{ secrets.FIREBASE_APP_ID }}\"," >> config.js
          echo "        measurementId: \"${{ secrets.FIREBASE_MEASUREMENT_ID }}\"" >> config.js
          echo "    }," >> config.js
          echo "    BREVO: {" >> config.js
          echo "        apiKey: \"${{ secrets.BREVO_API_KEY }}\"," >> config.js
          echo "        senderEmail: \"${{ secrets.BREVO_SENDER_EMAIL }}\"," >> config.js
          echo "        senderName: \"${{ secrets.BREVO_SENDER_NAME }}\"" >> config.js
          echo "    }," >> config.js
          echo "    PAYSTACK: {" >> config.js
          echo "        publicKey: \"${{ secrets.PAYSTACK_PUBLIC_KEY }}\"" >> config.js
          echo "    }," >> config.js
          echo "    LINKS: {" >> config.js
          echo "        whatsappSupport: \"${{ secrets.WHATSAPP_SUPPORT }}\"" >> config.js
          echo "    }" >> config.js
          echo "};" >> config.js

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
